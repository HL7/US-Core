description: This CapabilityStatement describes the expected capabilities of the
  US Core Client which is responsible for creating and initiating the queries
  for information about an individual patient. The complete list of FHIR
  profiles, RESTful operations, and search parameters supported by US Core
  Servers are defined in the [US Core
  CapabilityStatement](CapabilityStatement-us-core-server.html). US Core Clients
  have the option of choosing from this list to access necessary data based on
  their local use cases and other contextual requirements.
