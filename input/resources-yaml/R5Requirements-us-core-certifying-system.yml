resourceType: Requirements
id: us-core-certifying-system
url: http://hl7.org/fhir/us/core/Requirements/us-core-certifying-system
name: USCoreCertifyingSystemRequirements
title: US Core Certifying System Requirements
description: This [Requirements](https://hl7.org/fhir/R5/requirements.html) resource lists the *additional requirements* for systems certifying for Office of the National Coordinator for Health Information Technology (ONC) Health IT Certification (g(10) certification. These requirements represent the regulatory and technical specifications that design artifacts must meet to ensure interoperability.  See the [US Core Server Requirements](Requirements-us-core-server.html) for the US Core Responder (Server) requirements defined in the US Core Implementation Guide narrative sections.
_actor:
  - extension:
      - url: http://hl7.org/fhir/StructureDefinition/display
        valueString: US Core Certifying System
statement:
  - key: CONF-0011
    reference:
      - general-requirements.html#profile-support--interaction-support
    conformance:
      - SHALL
    requirement: A Server that certifies to the [21st Century Cures Act for accessing patient data](https://www.federalregister.gov/d/2020-07419/p-1177) **SHALL** implement all components in the USCDI [[USCDI link](https://www.healthit.gov/isp/united-states-core-data-interoperability-uscdi)]
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-requirements.html#CONF-0011
  - key: CONF-0012
    reference:
      - general-requirements.html#profile-support--interaction-support
    conformance:
      - SHALL
    requirement: A Server that certifies to the [21st Century Cures Act for accessing patient data](https://www.federalregister.gov/d/2020-07419/p-1177) **SHALL** implement all components in the ... the US Core CapabilityStatement [[Definition](https://hl7.org/fhir/us/core/CapabilityStatement-us-core-Server.html)] .
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-requirements.html#CONF-0012
  - key: CONF-0124
    reference:
      - scopes.html#smart-scopes
    conformance:
      - SHALL
    conditionality: true
    requirement: Implementations meeting US EHR certification [of the ONC IT Health Certification program] requirements must support all US Core’s required scopes.
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: scopes.html#CONF-0124
  - key: CONF-0392
    reference:
      - StructureDefinition-us-core-immunization.html#profile-specific-implementation-guidance
    conformance:
      - SHOULD
    requirement: '[NDC vaccine codes](http://www2a.cdc.gov/vaccines/iis/iisstandards/ndc_crosswalk.asp) **SHOULD** be supported as an additional code [of [CVX Vaccine Codes](https://www2a.cdc.gov/vaccines/iis/iisstandards/ndc_crosswalk.asp)]'
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: StructureDefinition-us-core-immunization.html#CONF-0392
  - key: CONF-0411
    reference:
      - StructureDefinition-us-core-medicationrequest.html#profile-specific-implementation-guidance
    conformance:
      - SHALL
    conditionality: true
    requirement: Although both MedicationRequest.reasonCode and MedicationRequest.reasonReference are marked as Additional USCDI Requirements [which are required for organizations participating in the ONC Health IT Certification program]. The certifying Server system is not required to support both, but **SHALL** support at least one of these elements
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: StructureDefinition-us-core-medicationrequest.html#CONF-0411
  - key: CONF-0414
    reference:
      - StructureDefinition-us-core-medicationrequest.html#profile-specific-implementation-guidance
    conformance:
      - SHALL
    conditionality: true
    requirement: '[For organizations participating in the ONC Health IT Certification program and supporting MedicationRequest.reasonReference,] Servers **SHALL** support at least one target resource in MedicationRequest.reasonReference'
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: StructureDefinition-us-core-medicationrequest.html#CONF-0414
  - key: CONF-0444
    reference:
      - StructureDefinition-us-core-simple-observation.html#profile-specific-implementation-guidance
    conformance:
      - SHALL
    conditionality: true
    requirement: Although none of the Observation.derivedFrom [references are flagged as Must Support](https://hl7.org/fhir/us/core/STU8/must-support.html#must-support---resource-references), the Certifying System *SHALL** support at least one of them
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: StructureDefinition-us-core-simple-observation.html#CONF-0444
  - key: CONF-0465
    reference:
      - StructureDefinition-us-core-patient.html#profile-specific-implementation-guidance
    conformance:
      - SHALL
    requirement: Although Patient.deceased[x] is marked as additional USCDI, certifying systems are not required to support both [boolean and dateTime data types], but **SHALL** support [at] least Patient.deceasedDateTime
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: StructureDefinition-us-core-patient.html#CONF-0465
  - key: CONF-0469
    reference:
      - StructureDefinition-us-core-patient.html#profile-specific-implementation-guidance
    conformance:
      - SHALL
    requirement: '[Certifying systems](https://www.healthit.gov/topic/certification-ehrs/about-onc-health-it-certification-program) [, those that are participating in the ONC Health IT certification program,] **SHALL**... follow the [Project US@ Technical Specification for Patient Addresses Final Version 1.0](https://asapnet.org/wp-content/uploads/2022/03/Project_US_FINAL_Technical_Specification_Version_1.0.pdf) as the standard style guide for Patient.address.line and Patient.address.city for new and updated records.'
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: StructureDefinition-us-core-patient.html#CONF-0469
  - key: CONF-0482
    reference:
      - StructureDefinition-us-core-procedure.html#profile-specific-implementation-guidance
    conformance:
      - SHALL
    conditionality: true
    requirement: '[For organizations participating in the ONC Health IT Certification program] Servers … **SHALL** support ... US Core Procedure Profile for communicating the reason or justification for a referral as Additional USCDI Requirements'
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: StructureDefinition-us-core-procedure.html#CONF-0482
  - key: CONF-0484
    reference:
      - StructureDefinition-us-core-procedure.html#profile-specific-implementation-guidance
    conformance:
      - SHALL
    conditionality: true
    requirement: '[For organizations participating in the ONC Health IT Certification program,] although both Procedure.reasonCode and Procedure.reasonReference are marked as Additional USCDI Requirements, the certifying Server system is not required to support both, but **SHALL** support at least one of these elements.'
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: StructureDefinition-us-core-procedure.html#CONF-0484
  - key: CONF-0516
    reference:
      - StructureDefinition-us-core-servicerequest.html#profile-specific-implementation-guidance
    conformance:
      - SHALL
    conditionality: true
    requirement: '[For organizations participating in the ONC Health IT Certification program] Servers … **SHALL** support ... US Core Service Request Profile for communicating the reason or justification for a referral as Additional USCDI Requirements'
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: StructureDefinition-us-core-servicerequest.html#CONF-0516
  - key: CONF-0518
    reference:
      - StructureDefinition-us-core-servicerequest.html#profile-specific-implementation-guidance
    conformance:
      - SHALL
    conditionality: true
    requirement: '[For organizations participating in the ONC Health IT Certification program,] although both ServiceRequest.reasonCode and ServiceRequest.reasonReference are marked as Additional USCDI Requirements, the certifying Server system is not required to support both, but **SHALL** support at least one of these elements.'
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: StructureDefinition-us-core-servicerequest.html#CONF-0518
  - key: CONF-0520
    reference:
      - StructureDefinition-us-core-servicerequest.html#profile-specific-implementation-guidance
    conformance:
      - SHALL
    conditionality: true
    requirement: '[For organizations participating in the ONC Health IT Certification program,] when using ServiceRequest.reasonReference Servers **SHALL** support at least one target resource in ServiceRequest.reasonReference'
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: StructureDefinition-us-core-servicerequest.html#CONF-0520
  - key: CONF-0522
    reference:
      - StructureDefinition-us-core-servicerequest.html#profile-specific-implementation-guidance
    conformance:
      - SHOULD
    conditionality: true
    requirement: '[For organizations participating in the ONC Health IT Certification program,] when using ServiceRequest.reasonReference …The referenced resources **SHOULD** be a US Core Profile as documented in [Referencing US Core Profiles](https://hl7.org/fhir/us/core/STU8/general-guidance.html#referencing-us-core-profiles)'
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: StructureDefinition-us-core-servicerequest.html#CONF-0522
  - key: CONF-0801
    reference:
      - must-support.html#defined-pattern-elements
    conformance:
      - SHALL
    conditionality: true
    requirement: If an element is marked as *Additional USCDI* and defined by a pattern [as described by [ElementDefinition.pattern](http://hl7.org/fhir/R4/elementdefinition-definitions.html#ElementDefinition.pattern_x_)], then the pattern defines the elements *and* element values that the Certifying System **SHALL** be capable of providing.
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: must-support.html#CONF-0801
  - key: CONF-0802
    reference:
      - must-support.html#must-support---primitive-elements
    conformance:
      - SHALL
    conditionality: true
    requirement: |2-



      Primitive elements are single elements with a primitive value…. If they are marked as *Additional USCDI*, then the Certifying System **SHALL** be capable of providing the element value to meet the *Additional USCDI* requirement.
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: must-support.html#CONF-0802
  - key: CONF-0803
    reference:
      - must-support.html#must-support---complex-elements
    conformance:
      - SHALL
    requirement: 'For any complex element marked as *Additional USCDI*, the Certifying System **SHALL** be capable of providing at least one of the sub-element values. '
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: must-support.html#CONF-0803
  - key: CONF-0805
    reference:
      - must-support.html#must-support---complex-elements
    conformance:
      - SHALL
    requirement: '[I]f any sub-element is marked as *Additional USCDI* [for a complex element] and the parent element is not… [and] the parent element is represented in the structure, Certifying System **SHALL** support the sub-elements labeled as *Additional USCDI*.'
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: must-support.html#CONF-0805
  - key: CONF-0809
    reference:
      - must-support.html#must-support-targets-for-us-core-profiles
    conformance:
      - SHALL
    conditionality: true
    requirement: When a Reference type element is labeled as Additional USCDI and has a single target profile referenced, the target profile **SHALL** be supported for Certifying Systems.
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: must-support.html#CONF-0809
  - key: CONF-0811
    reference:
      - must-support.html#must-support-targets-for-us-core-profiles
    conformance:
      - SHALL
    conditionality: true
    requirement: When a Reference type element labeled as Additional USCDI, has multiple target profiles referenced, and specific targets are labeled as Must Support, the Must Support target profile(s) **SHALL** be supported by Certifying Systems.
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: must-support.html#CONF-0811
  - key: CONF-0812
    reference:
      - must-support.html#must-support---slices
    conformance:
      - SHALL
    conditionality: true
    requirement: '[I]f a slice is labeled as ... Must Support/Additional USCDI and the slicer element is not labeled as ... Additional USCDI, then if the ... certifying system supports the element, it must support the slice''s definition. There are no examples of this structure in US Core.'
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: must-support.html#CONF-0812
  - key: CONF-0814
    reference:
      - must-support.html#must-support---slices
    conformance:
      - SHALL
    conditionality: true
    requirement: '[I]f a slice is labeled as … Must Support and the slicer element is ... labeled as … Must Support/Additional USCDI, then … certifying system [**SHALL** support] the element[ and] the slice''s definition.'
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: must-support.html#CONF-0814
  - key: CONF-0833
    reference:
      - StructureDefinition-us-core-condition-problems-health-concerns.html#profile-specific-implementation-guidance
    conformance:
      - SHALL
    conditionality: true
    requirement: Certifying Systems **SHALL** support, a category of "sdoh"
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: StructureDefinition-us-core-condition-problems-health-concerns.html#CONF-0833
  - key: CONF-0834
    reference:
      - StructureDefinition-us-core-condition-problems-health-concerns.html#profile-specific-implementation-guidance
    conformance:
      - SHOULD
    requirement: Certifying Systems ... **SHOULD** support the ... [US Core Simple Observation Category](https://hl7.org/fhir/us/core/STU8/ValueSet-us-core-simple-observation-category.html) codes
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: StructureDefinition-us-core-condition-problems-health-concerns.html#CONF-0834
  - key: CONF-0835
    reference:
      - StructureDefinition-us-core-condition-problems-health-concerns.html#profile-specific-implementation-guidance
    conformance:
      - MAY
    requirement: Certifying Systems ... **MAY** support other categories
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: StructureDefinition-us-core-condition-problems-health-concerns.html#CONF-0835
  - key: CONF-0846
    reference:
      - StructureDefinition-us-core-observation-screening-assessment.html#profile-specific-implementation-guidance
    conformance:
      - SHALL
    conditionality: true
    requirement: '[For the US Core Observation Screening Assessment Profile,] Certifying Systems **SHALL** support, the [US Core Screening Assessment Observation Category](https://hl7.org/fhir/us/core/STU8/ValueSet-us-core-screening-assessment-observation-category.html) codes'
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: StructureDefinition-us-core-observation-screening-assessment.html#CONF-0846
  - key: CONF-0847
    reference:
      - StructureDefinition-us-core-observation-screening-assessment.html#profile-specific-implementation-guidance
    conformance:
      - SHOULD
    requirement: '[For the US Core Observation Screening Assessment Profile,] Certifying Systems **SHOULD** support, the [US Core Screening Assessment Observation Maximum Category](https://hl7.org/fhir/us/core/STU8/ValueSet-us-core-screening-assessment-observation-maximum-category.html) codes'
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: StructureDefinition-us-core-observation-screening-assessment.html#CONF-0847
  - key: CONF-0848
    reference:
      - StructureDefinition-us-core-observation-screening-assessment.html#profile-specific-implementation-guidance
    conformance:
      - MAY
    requirement: '[For the US Core Observation Screening Assessment Profile,] Certifying Systems **MAY** support other codes.'
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: StructureDefinition-us-core-observation-screening-assessment.html#CONF-0848
  - key: CONF-0852
    reference:
      - StructureDefinition-us-core-patient.html#profile-specific-implementation-guidance
    conformance:
      - SHALL
    conditionality: true
    requirement: Although the [[US Core Interpreter Needed Extension](https://hl7.org/fhir/us/core/STU8/StructureDefinition-us-core-interpreter-needed.html)] is marked as an Additional USCDI Requirement on both US Core Patient and US Core Encounter Profiles, the certifying Server system is not required to support the extension on both profiles but **SHALL** support the extension on at least one.
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: StructureDefinition-us-core-patient.html#CONF-0852
  - key: CONF-0861
    reference:
      - StructureDefinition-us-core-simple-observation.html#profile-specific-implementation-guidance
    conformance:
      - SHOULD
    conditionality: true
    requirement: '[For [US Core Simple Observation Profile](https://hl7.org/fhir/us/core/STU8/StructureDefinition-us-core-simple-observation.html), ]Certifying Systems ... **SHOULD** support the other [US Core Simple Observation Category codes](https://hl7.org/fhir/us/core/STU8/ValueSet-us-core-simple-observation-category.html) [in addition to  the [US Core Screening Assessment Observation Category codes](https://hl7.org/fhir/us/core/STU8/ValueSet-us-core-screening-assessment-observation-category.html)]'
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: StructureDefinition-us-core-simple-observation.html#CONF-0861
  - key: CONF-0862
    reference:
      - StructureDefinition-us-core-simple-observation.html#profile-specific-implementation-guidance
    conformance:
      - SHALL
    conditionality: true
    requirement: '[For [US Core Simple Observation Profile](https://hl7.org/fhir/us/core/STU8/StructureDefinition-us-core-simple-observation.html), ]Certifying Systems **SHALL** support, the [US Core Screening Assessment Observation Category codes](https://hl7.org/fhir/us/core/STU8/ValueSet-us-core-screening-assessment-observation-category.html)'
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: StructureDefinition-us-core-simple-observation.html#CONF-0862
  - key: CONF-0863
    reference:
      - StructureDefinition-us-core-simple-observation.html#profile-specific-implementation-guidance
    conformance:
      - MAY
    conditionality: true
    requirement: '[For [US Core Simple Observation Profile](https://hl7.org/fhir/us/core/STU8/StructureDefinition-us-core-simple-observation.html), ]Certifying Systems ... **MAY** support other categories [in addition to  [US Core Screening Assessment Observation Category codes](https://hl7.org/fhir/us/core/STU8/ValueSet-us-core-screening-assessment-observation-category.html) and  [US Core Simple Observation Category codes](https://hl7.org/fhir/us/core/STU8/ValueSet-us-core-simple-observation-category.html)].'
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: StructureDefinition-us-core-simple-observation.html#CONF-0863
  - key: CONF-0872
    reference:
      - must-support.html#must-support---slices
    conformance:
      - SHALL
    conditionality: true
    requirement: '[I]f a slice is labeled as Additional USCDI... and the slicer element is ... labeled as Must Support/Additional USCDI..., then ... the Certifying System... [**SHALL** support] the element[ and] the slice''s definition.'
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: must-support.html#CONF-0872
  - key: CONF-0883
    reference:
      - must-support.html#must-support---resource-references
    conformance:
      - SHALL
    requirement: When a Reference element is labeled as *Additional USCDI* has multiple target profiles referenced, but none are labeled as *Must Support*, *at least one* target profile **SHALL** be supported by Certifying Systems.
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: must-support.html#CONF-0883
  - key: CONF-0884
    reference:
      - must-support.html#must-support---choice-of-data-types
    conformance:
      - SHALL
    requirement: If an *Additional USCDI* element has a choice of datatypes for its content, the datatypes the Certifying System **SHALL** support are labeled as *Must Support*.
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: must-support.html#CONF-0884
  - key: CONF-0902
    reference:
      - StructureDefinition-us-core-location.html#profile-specific-implementation-guidance
    conformance:
      - MAY
    requirement: Healthcare Service Location Codes (HSLOC) and SNOMED-CT Healthcare Facility Type value sets meet the USCDI applicable vocabulary standard for the Encounter Location Data Element. Certifying Systems **MAY** use a code from either vocabulary.
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: StructureDefinition-us-core-location.html#CONF-0902
