          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: StructureDefinition-us-core-organization.html#CONF-0456
  - key: CONF-0457
    reference:
      - StructureDefinition-us-core-organization.html#profile-specific-implementation-guidance
    conformance:
