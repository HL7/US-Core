      - StructureDefinition-head-occipital-frontal-circumference-percentile.html#profile-specific-implementation-guidance
    conformance:
      - SHOULD
    requirement: Information about the growth chart tables used to determine percentiles **SHOULD** be supplied in Observation.note.text
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: StructureDefinition-pediatric-bmi-for-age.html#CONF-0448
      - extension:
