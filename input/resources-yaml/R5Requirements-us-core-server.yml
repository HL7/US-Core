    requirement: ' **SHOULD  NOT** supply the unit field]'
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-guidance.html#CONF-0186
  - key: CONF-0187
