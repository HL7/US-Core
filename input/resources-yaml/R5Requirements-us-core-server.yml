    conformance:
      - SHOULD
    requirement: A FHIR Server **SHOULD** update the appropriate resource status to entered-in-error or inactive [when requested to delete records]
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-guidance.html#CONF-0188
  - key: CONF-0189
    reference:
      - general-guidance.html#representing-deleted-and-entered-in-error-information
    conformance:
      - SHOULD
    conditionality: true
    requirement: If a system supports the deletion of records, they **SHOULD** refer to the [Deletion Safety Checks](http://hl7.org/fhir/R4/safety.html#conformance) in the FHIR specification.
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-guidance.html#CONF-0189
  - key: CONF-0190
    reference:
      - general-guidance.html#representing-deleted-and-entered-in-error-information
    conformance:
      - SHOULD
    conditionality: true
    requirement: A FHIR Server **SHOULD** allow these resources [those entered in error] to be searchable by Client applications.
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-guidance.html#CONF-0190
  - key: CONF-0191
    reference:
      - general-guidance.html#representing-deleted-and-entered-in-error-information
    conformance:
      - SHOULD
    conditionality: true
    requirement: |-
      If the FHIR Server has updated the resource status to entered-in-error:
      For patient facing applications, A FHIR Server **SHOULD** remove the resource’s contents, leaving only an id and status. Note that this typically will not conform to the US Core or FHIR StructureDefinitions.
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-guidance.html#CONF-0191
