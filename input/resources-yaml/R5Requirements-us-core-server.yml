  - key: CONF-0464
    reference:
      - StructureDefinition-us-core-patient.html#profile-specific-implementation-guidance
    conformance:
      - SHALL
    conditionality: true
    requirement: The Complex [Extension] for ... Ethnicity allow[s] for one or more codes of which **SHALL**  include a text description [of category codes when using the [US Core Ethnicity Extension] (https://hl7.org/fhir/us/core/STU8/StructureDefinition-us-core-ethnicity.html)]
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: StructureDefinition-us-core-patient.html#CONF-0464
  - key: CONF-0466
    reference:
      - StructureDefinition-us-core-patient.html#profile-specific-implementation-guidance
    conformance:
      - SHALL
    conditionality: true
    requirement: Systems **SHALL** represent *Previous name*  by setting `Patient.name.use` to "old" or providing an end date in `Patient.name.period` or doing both.
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: StructureDefinition-us-core-patient.html#CONF-0466
  - key: CONF-0467
    reference:
      - StructureDefinition-us-core-patient.html#profile-specific-implementation-guidance
    conformance:
      - SHALL
    conditionality: true
    requirement: Systems **SHALL** represent *Previous Address* by setting `Patient.address.use` to "old" or providing an end date in `Patient.address.period` or doing both.
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: StructureDefinition-us-core-patient.html#CONF-0467
  - key: CONF-0470
    reference:
      - StructureDefinition-us-core-patient.html#profile-specific-implementation-guidance
    conformance:
      - SHOULD
    requirement: Non-certifying systems[, systems that are not participating in the ONC Health IT certification program,] **SHOULD** follow the [Project US@ Technical Specification for Patient Addresses Final Version 1.0](https://asapnet.org/wp-content/uploads/2022/03/Project_US_FINAL_Technical_Specification_Version_1.0.pdf) as the standard style guide for Patient.address.line and Patient.address.city for new and updated records.
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: StructureDefinition-us-core-patient.html#CONF-0470
  - key: CONF-0471
    reference:
      - StructureDefinition-us-core-patient.html#profile-specific-implementation-guidance
    conformance:
      - MAY
    conditionality: true
    requirement: '[For systems participating in the ONC Health IT certification program,] this requirement [to follow the [Project US@ Technical Specification for Patient Addresses Final Version 1.0](https://asapnet.org/wp-content/uploads/2022/03/Project_US_FINAL_Technical_Specification_Version_1.0.pdf) for Patient.address.line and Patient.address.city]. Both certifying and non-certifying systems **MAY**  choose not to use Project US@ for historical records or documents that are not exposed through FHIR-based APIs.'
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: StructureDefinition-us-core-patient.html#CONF-0471
  - key: CONF-0472
    reference:
      - StructureDefinition-us-core-patient.html#profile-specific-implementation-guidance
    conformance:
      - SHOULD-NOT
    requirement: ' **SHOULD  NOT** be used as a patient identifier in Patient.identifier.value'
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: StructureDefinition-us-core-patient.html#CONF-0472
  - key: CONF-0473
    reference:
      - StructureDefinition-us-core-practitioner.html#profile-specific-implementation-guidance
    conformance:
      - SHALL
    conditionality: true
    requirement: Servers that support only the US Core Practitioner Profile and do not support the [US Core PractitionerRole Profile](https://hl7.org/fhir/us/core/STU8/StructureDefinition-us-core-practitionerrole.html) **SHALL**  provide implementation-specific guidance on how to access a provider’s location and contact information using only the Practitioner resource.
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: StructureDefinition-us-core-practitioner.html#CONF-0473
  - key: CONF-0474
    reference:
      - StructureDefinition-us-core-practitioner.html#profile-specific-implementation-guidance
    conformance:
      - MAY
    conditionality: true
    requirement: Although Practitioner.address is marked as Must Support, the Server system **MAY**  choose not to support it if they support the US Core PractitionerRole Profile
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: StructureDefinition-us-core-practitioner.html#CONF-0474
  - key: CONF-0475
    reference:
      - StructureDefinition-us-core-practitioner.html#profile-specific-implementation-guidance
    conformance:
      - SHALL
    conditionality: true
    requirement: '[When using the US Core Practitioner Profile] Practitioner.address … **SHALL**[be supported] if … [the Server does] not support the US Core PractitionerRole Profile'
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: StructureDefinition-us-core-practitioner.html#CONF-0475
  - key: CONF-0477
    reference:
      - StructureDefinition-us-core-practitioner.html#profile-specific-implementation-guidance
    conformance:
      - SHOULD
    requirement: Only professional/work contact information about the practitioner **SHOULD** be available to the patient
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: StructureDefinition-us-core-practitioner.html#CONF-0477
  - key: CONF-0480
    reference:
      - StructureDefinition-us-core-procedure.html#profile-specific-implementation-guidance
    conformance:
      - SHOULD
    conditionality: true
    requirement: '[If using LOINC codes in procedure.code] only LOINC concepts that reflect actual procedures **SHOULD** be used'
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: StructureDefinition-us-core-procedure.html#CONF-0480
  - key: CONF-0486
    reference:
      - StructureDefinition-us-core-procedure.html#profile-specific-implementation-guidance
    conformance:
      - SHALL
    conditionality: true
    requirement: '[For organizations participating in the ONC Health IT Certification program,] when using Procedure.reasonReference Servers **SHALL** support at least one target resource in Procedure.reasonReference'
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: StructureDefinition-us-core-procedure.html#CONF-0486
  - key: CONF-0488
    reference:
      - StructureDefinition-us-core-procedure.html#profile-specific-implementation-guidance
    conformance:
      - SHOULD
    conditionality: true
    requirement: '[For organizations participating in the ONC Health IT Certification program,] when using Procedure.reasonReference …The referenced resources **SHOULD** be a US Core Profile as documented in [Referencing US Core Profiles](https://hl7.org/fhir/us/core/STU8/general-guidance.html#referencing-us-core-profiles)'
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: StructureDefinition-us-core-procedure.html#CONF-0488
  - key: CONF-0489
    reference:
      - StructureDefinition-us-core-provenance.html#profile-specific-implementation-guidance
    conformance:
      - SHALL
    requirement: |-
      The US Core Provenance resource **SHALL** be supported for these US Core resource types:
      AllergyIntolerance, CarePlan, CareTeam, Condition, Coverage, Device, DiagnosticReport, DocumentReference, Encounter, Goal, Immunization, MedicationDispense, MedicationRequest, Observation, Patient, Procedure, QuestionnaireResponse, RelatedPerson, ServiceRequest
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: StructureDefinition-us-core-provenance.html#CONF-0489
  - key: CONF-0508
    reference:
      - StructureDefinition-us-core-provenance.html#profile-specific-implementation-guidance
    conformance:
      - SHALL
    conditionality: true
    requirement: If a system receives a provider in Provenance.agent.who as free text, they must capture [the organization] who sent them the information [and upon] request ... **SHALL**  provide this organization as the source
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: StructureDefinition-us-core-provenance.html#CONF-0508
  - key: CONF-0509
    reference:
      - StructureDefinition-us-core-provenance.html#profile-specific-implementation-guidance
    conformance:
      - MAY
    conditionality: true
    requirement: If a system receives a provider in Provenance.agent.who as free text, … [upon request they] **MAY**   include the free text provider.
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: StructureDefinition-us-core-provenance.html#CONF-0509
  - key: CONF-0514
    reference:
      - StructureDefinition-us-core-servicerequest.html#profile-specific-implementation-guidance
    conformance:
      - MAY
    requirement: The Must Support `ServiceRequest.category` is bound, at a minimum, to the [US Core ServiceRequest Category Codes](https://hl7.org/fhir/us/core/STU8/ValueSet-us-core-servicerequest-category.html), and other category codes **MAY**  be used.
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: StructureDefinition-us-core-servicerequest.html#CONF-0514
  - key: CONF-0515
    reference:
