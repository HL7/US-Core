  - key: CONF-0252
    reference:
      - medication-list.html#fetching-all-medications-active-medications-and-all-medications-for-an-encounter
    conformance:
      - SHALL
    requirement: |-
      Requirements to access “all medications” [all historical, active, and future prescribed medications and medications entered in error and whose status is unknown.] and “all active medications” [all medications with an active status. Active medications do not include past, future, unknown status, and entered-in-error medications.] for a patient:
      A MedicationRequest resource query **SHALL** be all that is required to access "all medications" or "all active medications" for a patient. (In other words, no other medication resource type needs to be fetched)
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: medication-list.html#CONF-0252
  - key: CONF-0253
    reference:
      - medication-list.html#fetching-all-medications-active-medications-and-all-medications-for-an-encounter
    conformance:
      - SHALL
    requirement: |-
      Requirements to access “all medications” [all historical, active, and future prescribed medications and medications entered in error and whose status is unknown.] and “all active medications” [all medications with an active status. Active medications do not include past, future, unknown status, and entered-in-error medications.] for a patient:
      The [MedicationRequest resource] query result **SHALL** include all MedicationRequest resources with a `MedicationRequest.intent` = "order" representing authorized medication orders directly derived from the system's orders.
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: medication-list.html#CONF-0253
  - key: CONF-0254
    reference:
      - medication-list.html#fetching-all-medications-active-medications-and-all-medications-for-an-encounter
    conformance:
      - SHALL
    requirement: |-
      Requirements to access “all medications” [all historical, active, and future prescribed medications and medications entered in error and whose status is unknown.] and “all active medications” [all medications with an active status. Active medications do not include past, future, unknown status, and entered-in-error medications.] for a patient:
      The [MedicationRequest resource] query result **SHALL** include all prescribed and "self-prescribed" MedicationRequest resources with a `MedicationRequest.intent` = "plan" representing reported medications.
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: medication-list.html#CONF-0254
  - key: CONF-0256
    reference:
      - medication-list.html#fetching-all-medications-active-medications-and-all-medications-for-an-encounter
    conformance:
      - SHALL
    requirement: |-
      Requirements to access “all medications” [all historical, active, and future prescribed medications and medications entered in error and whose status is unknown.] and “all active medications” [all medications with an active status. Active medications do not include past, future, unknown status, and entered-in-error medications.] for a patient:
      Servers **SHALL** use the `MedicationRequest.reported[x]` element to indicate that the MedicationRequest record was captured as a secondary "reported" record rather than an original primary source-of-truth record.
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: medication-list.html#CONF-0256
  - key: CONF-0258
    reference:
      - medication-list.html#fetching-all-medications-active-medications-and-all-medications-for-an-encounter
    conformance:
      - SHOULD
    requirement: |-
      Requirements to access “all medications” [all historical, active, and future prescribed medications and medications entered in error and whose status is unknown.] and “all active medications” [all medications with an active status. Active medications do not include past, future, unknown status, and entered-in-error medications.] for a patient:
      When recording "self-prescribed" medication, Servers **SHOULD** use the `MedicationRequest.requester` element to indicate the Patient or RelatedPerson is the prescriber.
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: medication-list.html#CONF-0258
  - key: CONF-0259
    reference:
      - medication-list.html#fetching-all-medications-active-medications-and-all-medications-for-an-encounter
    conformance:
      - SHOULD
    requirement: "Requirements to access “all medications” [all historical, active, and future prescribed medications and medications entered in error and whose status is unknown.] and “all active medications” [all medications with an active status. Active medications do not include past, future, unknown status, and entered-in-error medications.] for a patient:\nServers **SHOULD** support the encounter search parameter. "
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: medication-list.html#CONF-0259
  - key: CONF-0260
    reference:
      - medication-list.html#fetching-all-medications-active-medications-and-all-medications-for-an-encounter
    conformance:
      - SHOULD
    conditionality: true
    requirement: |-
      Requirements to access “all medications” [all historical, active, and future prescribed medications and medications entered in error and whose status is unknown.] and “all active medications” [all medications with an active status. Active medications do not include past, future, unknown status, and entered-in-error medications.] for a patient:
      [If Servers support the encounter search parameter, s]earching by encounter will return all medications ordered during that encounter, including medications administered in the hospital and prescribed or discharge medications intended to be taken at home.
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: medication-list.html#CONF-0260
  - key: CONF-0262
    reference:
      - medication-list.html#fetching-all-medications-active-medications-and-all-medications-for-an-encounter
    conformance:
      - MAY
    requirement: |-
      Requirements to access “all medications” [all historical, active, and future prescribed medications and medications entered in error and whose status is unknown.] and “all active medications” [all medications with an active status. Active medications do not include past, future, unknown status, and entered-in-error medications.] for a patient:
      Servers **MAY**  support the search parameters `category`and `encounter`. This search will return all medications ordered during an encounter for a given MedicationRequest.category such as "inpatient".
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: medication-list.html#CONF-0262
  - key: CONF-0263
    reference:
      - medication-list.html#de-duplication-of-data
    conformance:
      - MAY
    requirement: To provide a list of a patient’s medications, it **MAY** be necessary to “de-duplicate” them. The de-duplication activity **MAY**  be  supplied by the Server
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: medication-list.html#CONF-0263
  - key: CONF-0267
    reference:
      - basic-provenance.html#hie-transformation
    conformance:
      - MAY
    requirement: An agent.type=”assembler”, agent.type=”transmitter”, or other agents from [Provenance Agent Type](https://hl7.org/fhir/us/core/STU8/ValueSet-us-core-provenance-participant-type.html) value set **MAY**  also be included.
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: basic-provenance.html#CONF-0267
  - key: CONF-0268
    reference:
      - screening-and-assessments.html#introduction
    conformance:
      - SHOULD
    requirement: implementers [of US Core's framework of Screening and Assessments] **SHOULD** consider more constrained, domain-specific profiles derived from the US Core Profiles to meet the needs of their respective use cases.
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: screening-and-assessments.html#CONF-0268
  - key: CONF-0269
    reference:
      - screening-and-assessments.html#clinical-judgments
    conformance:
      - SHALL
    requirement: |-
      Every Server that supports the USDCI Data Class “Health Status/Assessments”:

      **SHALL** support representing clinical judgments using [US Core Condition Problems and Health Concerns Profile](https://hl7.org/fhir/us/core/STU8/StructureDefinition-us-core-condition-problems-health-concerns.html) or [US Core Simple Observation Profile](https://hl7.org/fhir/us/core/STU8/StructureDefinition-us-core-simple-observation.html).
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: screening-and-assessments.html#CONF-0269
  - key: CONF-0270
    reference:
      - screening-and-assessments.html#clinical-judgments
    conformance:
      - SHOULD
    requirement: |-
      Every Server that supports the USDCI Data Class “Health Status/Assessments”:
      ...
      The US Core Simple Observation Profile's Observation.derivedFrom element **SHOULD** reference the [Structured Screening and Assessment](https://hl7.org/fhir/us/core/STU8/screening-and-assessments.html#structured-screening-and-assessments) upon which clinical judgment observations are made
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: screening-and-assessments.html#CONF-0270
  - key: CONF-0271
    reference:
      - screening-and-assessments.html#clinical-judgments
    conformance:
      - SHOULD
    requirement: |-
      Every Server that supports the USDCI Data Class “Health Status/Assessments”:
      ...
      the US Core Condition Profile's Condition.evidence.detail element **SHOULD** reference the [Structured Screening and Assessment](https://hl7.org/fhir/us/core/STU8/screening-and-assessments.html#structured-screening-and-assessments) which assist in diagnosing problems or health concerns.
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: screening-and-assessments.html#CONF-0271
  - key: CONF-0272
    reference:
      - screening-and-assessments.html#choosing-between-questionnaireresponse-and-observation
    conformance:
      - SHOULD
    requirement: |-
      For API developers using US Core, it’s important to understand when to use the QuestionnaireResponse versus Observation to represent structured assessments and surveys. Here are some guidelines to help choose the appropriate profile:
      Observations represent specific point-in-time facts that need to be searched, trended, the subject of statistical analysis, and directly referenced in support of other actions ... anything that meets one of the preceding criteria **SHOULD** be surfaced as an Observation.
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: screening-and-assessments.html#CONF-0272
  - key: CONF-0280
    reference:
      - screening-and-assessments.html#uscdi-health-assessments-data-element-value-sets
    conformance:
      - SHOULD
    requirement: Implementers **SHOULD** treat these [USCDI Health Status Assessments Data Element] value sets as having an [extensible](http://hl7.org/fhir/R4/terminologies.html#extensible) binding.
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: screening-and-assessments.html#CONF-0280
  - key: CONF-0281
    reference:
      - screening-and-assessments.html#uscdi-health-assessments-data-element-value-sets
    conformance:
      - SHOULD
    requirement: when recording SDOH data [with] US Core Profiles, Servers **SHOULD** use … [Social Determinants of Health Conditions Value Set](https://vsac.nlm.nih.gov/valueset/2.16.840.1.113762.1.4.1196.788/expansion), [Social Determinants of Health Procedures Value Set](https://vsac.nlm.nih.gov/valueset/2.16.840.1.113762.1.4.1196.789/expansion), [Social Determinants of Health Goals Value Set](https://vsac.nlm.nih.gov/valueset/2.16.840.1.113762.1.4.1247.71/expansion), [and] [Social Determinants of Health Service Requests Value Set](https://vsac.nlm.nih.gov/valueset/2.16.840.1.113762.1.4.1196.790/expansion)
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: screening-and-assessments.html#CONF-0281
  - key: CONF-0287
    reference:
      - changes-between-versions.html#no-guarantee-that-resource-ids-are-preserved
    conformance:
      - SHOULD
    requirement: Servers **SHOULD** maintain a stable common identifier for a resource across [FHIR] versions.
    _reference:
