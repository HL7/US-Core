          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: scopes.html#CONF-0120
  - key: CONF-0121
    reference:
      - scopes.html#capabilities-for-implementations-supporting-backend-services
    conformance:
