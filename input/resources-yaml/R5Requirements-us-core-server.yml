      - scopes.html#us-core-Servers-shall-support-token-introspection
    conformance:
      - SHALL
    requirement: US Core Server[s] **SHALL** support token introspection defined by the SMART App Launch Guide. For more details and additional consideration, see SMART App Launch’s [Token Introspection](https://hl7.org/fhir/smart-app-launch/STU2/token-introspection.html#token-introspection).
