      - StructureDefinition-us-core-patient.html#profile-specific-implementation-guidance
      - StructureDefinition-us-core-relatedperson.html#profile-specific-implementation-guidance
    conformance:
      - SHOULD
    requirement: ' … this profile uses USPS Two Letter Alphabetic Codes for US states. When encoding addresses outside the US, systems **SHOULD**  use the [ISO 3166 subdivision codes](https://www.iso.org/iso-3166-country-codes.html).'
    _reference:
