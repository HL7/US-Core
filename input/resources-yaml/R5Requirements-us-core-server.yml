  - key: CONF-0430
    reference:
      - StructureDefinition-us-core-observation-lab.html#profile-specific-implementation-guidance
    conformance:
      - SHOULD
    conditionality: true
    requirement: '[When sending US Core Laboratory Results Observation Profile] updates to .meta.lastUpdated **SHOULD** reflect new laboratory observations'
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: StructureDefinition-us-core-observation-lab.html#CONF-0430
  - key: CONF-0431
    reference:
      - StructureDefinition-us-core-observation-lab.html#profile-specific-implementation-guidance
    conformance:
      - SHOULD
    conditionality: true
    requirement: '[When sending US Core Laboratory Results Observation Profile] updates to .meta.lastUpdated **SHOULD** reflect changes in the status of laboratory observations, including events that trigger the same status (e.g., amended → amended)'
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: StructureDefinition-us-core-observation-lab.html#CONF-0431
  - key: CONF-0432
    reference:
      - StructureDefinition-us-core-observation-occupation.html#profile-specific-implementation-guidance
    conformance:
      - SHALL
    conditionality: true
    requirement: '[When sending US Core Observation Occupation Profile] for … [a] current job ,systems **SHALL** omit observation.effectivePeriod.end to indicate it is ongoing.'
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: StructureDefinition-us-core-observation-occupation.html#CONF-0432
  - key: CONF-0433
    reference:
      - StructureDefinition-us-core-observation-occupation.html#profile-specific-implementation-guidance
    conformance:
      - SHALL
    requirement: When the industry is known, but the occupation is not, systems **SHALL** use the value “unknown” from the [DataAbsentReason Code System](http://hl7.org/fhir/R4/codesystem-data-absent-reason.html)
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: StructureDefinition-us-core-observation-occupation.html#CONF-0433
  - key: CONF-0434
    reference:
      - StructureDefinition-us-core-observation-occupation.html#profile-specific-implementation-guidance
    conformance:
      - SHALL
    requirement: when the occupation is known but the industry is not, systems **SHALL** omit the industry Observation.component
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: StructureDefinition-us-core-observation-occupation.html#CONF-0434
  - key: CONF-0437
    reference:
      - StructureDefinition-us-core-observation-screening-assessment.html#profile-specific-implementation-guidance
    conformance:
      - SHOULD
    conditionality: true
    requirement: '[For] multi-question surveys or assessments Observation.code is an overarching assessment or screening code, and the Observation.value element **SHOULD** be empty'
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: StructureDefinition-us-core-observation-screening-assessment.html#CONF-0437
  - key: CONF-0438
    reference:
      - StructureDefinition-us-core-observation-screening-assessment.html#profile-specific-implementation-guidance
    conformance:
      - SHOULD
    conditionality: true
    requirement: A practitioner’s clinical observation or assertion about a patient’s health status, which is not a response to a screening or assessment question, **SHOULD** use the [US Core Simple Observation Profile](https://hl7.org/fhir/us/core/StructureDefinition-us-core-simple-observation.html) instead [of the US Core Observation Screening Assessment Profile]
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: StructureDefinition-us-core-observation-screening-assessment.html#CONF-0438
  - key: CONF-0439
    reference:
      - StructureDefinition-us-core-observation-screening-assessment.html#profile-specific-implementation-guidance
    conformance:
      - SHALL
    conditionality: true
    requirement: the Server system ... **SHALL** support [either] Reference(US Core Observation Screening Assessment Profile) or Reference(US Core QuestionnaireResponse Profile) for Observation.derivedFrom
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: StructureDefinition-us-core-observation-screening-assessment.html#CONF-0439
  - key: CONF-0441
    reference:
      - StructureDefinition-us-core-simple-observation.html#profile-specific-implementation-guidance
    conformance:
      - SHOULD
    requirement: Observations formally part of an assessment tool or survey **SHOULD** use the [US Core Observation Screening Assessment Profile](https://hl7.org/fhir/us/core/STU8/StructureDefinition-us-core-observation-screening-assessment.html).
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: StructureDefinition-us-core-simple-observation.html#CONF-0441
  - key: CONF-0442
    reference:
      - StructureDefinition-us-core-simple-observation.html#profile-specific-implementation-guidance
    conformance:
      - SHOULD
    requirement: An assertion or determination derived from screening and assessment tools **SHOULD** reference them using Observation.derivedFrom
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: StructureDefinition-us-core-simple-observation.html#CONF-0442
  - key: CONF-0443
    reference:
      - StructureDefinition-us-core-simple-observation.html#profile-specific-implementation-guidance
    conformance:
      - SHOULD
    requirement: When using `Observation.derivedFrom’ to reference an Observation, the referenced Observation **SHOULD** be a US Core Observation
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: StructureDefinition-us-core-simple-observation.html#CONF-0443
  - key: CONF-0447
    reference:
      - StructureDefinition-us-core-vital-signs.html#profile-specific-implementation-guidance
    conformance:
      - MAY
    requirement: '[US Core Vital Signs] observations **MAY**   have [component](http://hl7.org/fhir/R4/observation.html#gr-comp) observations … [see] FHIR core specification [vital signs table](http://hl7.org/fhir/R4/observation-vitalsigns.html#vitals-table) for examples'
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: StructureDefinition-us-core-vital-signs.html#CONF-0447
