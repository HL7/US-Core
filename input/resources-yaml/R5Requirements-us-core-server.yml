resourceType: Requirements
id: us-core-server
url: http://hl7.org/fhir/us/core/Requirements/us-core-server
name: USCoreServerRequirements
title: US Core Server Requirements
description: This [Requirements](https://hl7.org/fhir/R5/requirements.html) resource lists the US Core Responder (Server) requirements defined in the US Core Implementation Guide narrative sections. These requirements represent the regulatory, business, functional, and technical specifications that design artifacts must meet to ensure interoperability. See the [US Core Certifying System Requirements](Requirements-us-core-certifying-system.html) for the *additional requirements* for systems certifying for Office of the National Coordinator for Health Information Technology (ONC) Health IT Certification (g)(10) certification.
_actor:
  - extension:
      - url: http://hl7.org/fhir/StructureDefinition/display
        valueString: US Core Requestor (Server)
statement:
  - key: CONF-0001
    reference:
      - general-requirements.html#profile-only-support
    conformance:
      - SHALL
    requirement: 'To support a US Core Profile, a Server: **SHALL** Be able to populate all profile data elements that are mandatory and/or flagged as Must Support as defined by that profile’s StructureDefinition.'
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-requirements.html#CONF-0001
  - key: CONF-0002
    reference:
      - general-requirements.html#profile-only-support
    conformance:
      - SHOULD
    requirement: 'To support a US Core Profile, a Server: **SHOULD** declare support for a US Core Profile by including its official URL in the Server’s `CapabilityStatement.rest.resource.supportedProfile` element.'
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-requirements.html#CONF-0002
  - key: CONF-0003
    reference:
      - general-requirements.html#profile-support--interaction-support
    conformance:
      - MAY
    conditionality: true
    requirement: Servers **MAY** deploy and support one or more US Core Profiles to represent clinical information
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-requirements.html#CONF-0003
  - key: CONF-0004
    reference:
      - general-requirements.html#profile-support--interaction-support
    conformance:
      - MAY
    conditionality: true
    requirement: 'Server **MAY** deploy and support ... the following US Core interaction: “Quick Start” defined for each Profile'
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-requirements.html#CONF-0004
  - key: CONF-0005
    reference:
      - general-requirements.html#profile-support--interaction-support
    conformance:
      - MAY
    conditionality: true
    requirement: 'Server **MAY** deploy and support ... the following US Core interaction: [Clinical Notes](https://hl7.org/fhir/us/core/clinical-notes.html)'
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-requirements.html#CONF-0005
  - key: CONF-0006
    reference:
      - general-requirements.html#profile-support--interaction-support
    conformance:
      - MAY
    conditionality: true
    requirement: 'Server **MAY** deploy and support ... the following US Core interaction: [Medication List](https://hl7.org/fhir/us/core/medication-list.html)'
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-requirements.html#CONF-0006
  - key: CONF-0007
    reference:
      - general-requirements.html#profile-support--interaction-support
    conformance:
      - MAY
    conditionality: true
    requirement: 'Server **MAY** deploy and support ... the following US Core interaction: [Basic Provenance](https://hl7.org/fhir/us/core/basic-provenance.html)'
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-requirements.html#CONF-0007
  - key: CONF-0008
    reference:
      - general-requirements.html#profile-support--interaction-support
    conformance:
      - MAY
    conditionality: true
    requirement: 'Server **MAY** deploy and support ... the following US Core interaction: [Screening and Assessments](https://hl7.org/fhir/us/core/screening-and-assessments.html)'
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-requirements.html#CONF-0008
  - key: CONF-0009
    reference:
      - general-requirements.html#profile-support--interaction-support
    conformance:
      - MAY
    conditionality: true
    requirement: Servers implementing ... [clinical information representation] can claim conformance to the US Core Profile content structure ... by implementing all or parts of the US Core CapabilityStatement into their capabilities.
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-requirements.html#CONF-0009
  - key: CONF-0010
    reference:
      - general-requirements.html#profile-support--interaction-support
    conformance:
      - MAY
    conditionality: true
    requirement: Servers implementing ... [interactions] can claim conformance to the ... RESTful interactions defined by implementing all or parts of the US Core CapabilityStatement into their capabilities
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-requirements.html#CONF-0010
  - key: CONF-0013
    reference:
      - general-requirements.html#claiming-conformance-to-a-us-core-profile
    conformance:
      - SHALL
    requirement: "[To claim conformance to a US Core Profile] a conformant Server: \n\n**SHALL** Be able to populate all profile data elements that are mandatory and/or flagged as Must Support as defined by that profile’s StructureDefinition."
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-requirements.html#CONF-0013
  - key: CONF-0014
    reference:
      - general-requirements.html#claiming-conformance-to-a-us-core-profile
    conformance:
      - SHOULD
    requirement: "[To claim conformance to a US Core Profile] a conformant Server: \n\n**SHOULD** declare conformance with the US [Core Server Capability Statement](https://hl7.org/fhir/us/core/CapabilityStatement-us-core-Server.html) by including its official URL in the Server’s `CapabilityStatement.instantiates` element: `http://hl7.org/fhir/us/core/CapabilityStatement/us-core-Server`"
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-requirements.html#CONF-0014
  - key: CONF-0015
    reference:
      - general-requirements.html#claiming-conformance-to-a-us-core-profile
    conformance:
      - SHALL
    requirement: "[To claim conformance to a US Core Profile] a conformant Server: \n\n**SHALL** specify the full capability details from the US Core CapabilityStatement it claims to implement."
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-requirements.html#CONF-0015
  - key: CONF-0016
    reference:
      - general-requirements.html#claiming-conformance-to-a-us-core-profile
    conformance:
      - SHALL
    requirement: "[To claim conformance to a US Core Profile] a conformant Server: \n\n**SHALL**… Declare support for the US Core Profile by including its official URL in the Server’s CapabilityStatement.rest.resource.supportedProfile element."
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-requirements.html#CONF-0016
  - key: CONF-0017
    reference:
      - general-requirements.html#claiming-conformance-to-a-us-core-profile
    conformance:
      - SHALL
    requirement: "[To claim conformance to a US Core Profile] a conformant Server: \n\n**SHALL**… Declare support for the US Core Profile’s FHIR RESTful transactions."
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-requirements.html#CONF-0017
  - key: CONF-0018
    reference:
      - general-requirements.html#required-bindings-for-coded-elements
    conformance:
      - SHALL
    requirement: '[Required binding](http://hl7.org/fhir/R4/terminologies.html#required) to a ValueSet definition means that one of the codes from the specified ValueSet **SHALL** be used.'
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-requirements.html#CONF-0018
  - key: CONF-0019
    reference:
      - general-requirements.html#required-bindings-for-coded-elements
    conformance:
      - SHALL
    conditionality: true
    requirement: For `CodeableConcept`, which permits multiple codings and a text element, this [[Required binding](http://hl7.org/fhir/R4/terminologies.html#required) to a ValueSet definition] rule applies to at least one of the codings
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-requirements.html#CONF-0019
  - key: CONF-0020
    reference:
      - general-requirements.html#required-bindings-for-coded-elements
    requirement: For a [[required binding](http://hl7.org/fhir/R4/terminologies.html#required) to a ValueSet definition], a `CodeableConcept`which permits multiple codings and a text element … [using] only text is not valid.
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-requirements.html#CONF-0020
    extension:
      - url: http://hl7.org/fhir/tools/StructureDefinition/requirements-statementshallnot
        valueBoolean: true
  - key: CONF-0021
    reference:
      - general-requirements.html#required-bindings-for-coded-elements
    conformance:
      - SHALL
    requirement: '[When populating a coded element with a [required binding](http://hl7.org/fhir/R4/terminologies.html#required] to a ValueSet definition] US Core Responders **SHALL** provide a code exclusively from [the required binding] ValueSet'
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-requirements.html#CONF-0021
  - key: CONF-0023
    reference:
      - general-requirements.html#extensible-binding-for-coded-elements
    conformance:
      - SHALL
    conditionality: true
    requirement: '[Extensible binding] (http://hl7.org/fhir/R4/terminologies.html#extensible) means that one of the codes from the specified value set **SHALL** be used when an appropriate concept exists;…'
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-requirements.html#CONF-0023
  - key: CONF-0024
    reference:
      - general-requirements.html#extensible-binding-for-coded-elements
    conformance:
      - MAY
    conditionality: true
    requirement: '[When using an [extensible Binding] (http://hl7.org/fhir/R4/terminologies.html#extensible)] If no suitable code exists in the [extensible] ValueSet, alternate code(s) **MAY**  be used..'
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-requirements.html#CONF-0024
  - key: CONF-0026
    reference:
      - general-requirements.html#extensible-binding-for-coded-elements
    conformance:
      - SHOULD-NOT
    conditionality: true
    requirement: For `CodeableConcept` [with an [extensible binding] (http://hl7.org/fhir/R4/terminologies.html#extensible) … Text-only representation **SHOULD NOT** be used - coded values are expected whenever possible to support interoperability.
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-requirements.html#CONF-0026
  - key: CONF-0027
    reference:
      - general-requirements.html#extensible-binding-for-coded-elements
    conformance:
      - SHALL
    conditionality: true
    requirement: |-
      When claiming conformance to ... [to a US Core profile extensible binding rule, a] US Core Responders **SHALL** provide:
      A code from … [the] valueset 'DataElement.code.code' if the concept exists in the valueset [for a DataElement.code that has an extensible binding]
      Or an alternative code if the concept does not exist in the valueset [for a DataElement.code that has an extensible binding]
      Or text in ... `[DataElement.code.text]’ if only text is available [for a DataElement.code that has an extensible binding]
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-requirements.html#CONF-0027
  - key: CONF-0029
    reference:
      - general-requirements.html#translations
    conformance:
      - MAY
    requirement: Alternate codes **MAY** be provided in addition to the standard codes defined in required or extensible ValueSets. These alternate codes are called "additional codings".
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-requirements.html#CONF-0029
  - key: CONF-0030
    reference:
      - general-requirements.html#translations
    conformance:
      - MAY
    requirement: '[The additional codings] **MAY** be equivalent to or narrower in meaning than the standard concept code.'
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-requirements.html#CONF-0030
  - key: CONF-0033
    reference:
      - general-requirements.html#modifier-elements
    conformance:
      - MAY
    requirement: Not all modifier elements are Mandatory or Must Support, and there is no requirement for supporting them
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-requirements.html#CONF-0033
  - key: CONF-0034
    reference:
      - general-requirements.html#modifier-elements
    conformance:
      - MAY
    requirement: Servers **MAY**  communicate a system-wide profile in their CapabilityStatement to identify which additional elements, including modifier elements, they support
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-requirements.html#CONF-0034
  - key: CONF-0039
    reference:
      - general-requirements.html#missing-data
    conformance:
      - SHALL
    conditionality: true
    requirement: If the source system does not have data for an element with a minimum cardinality = 0 (including elements labeled Must Support), the data element **SHALL** be omitted from the resource.
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-requirements.html#CONF-0039
  - key: CONF-0040
    reference:
      - general-requirements.html#missing-data
    conformance:
      - SHALL
    conditionality: true
    requirement: If the data element is a Mandatory element (in other words, where the minimum cardinality is > 0), it **SHALL** be present even if the source system does not have data.
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-requirements.html#CONF-0040
  - key: CONF-0041
    reference:
      - general-requirements.html#missing-data
    conformance:
      - SHALL
    conditionality: true
    requirement: For [mandatory] non-coded data elements [where data is not available], use the [DataAbsentReason Extension](http://hl7.org/fhir/R4/extension-data-absent-reason.html) in the data type ... [with] the code `unknown` - The value is expected to exist but is not known.
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-requirements.html#CONF-0041
  - key: CONF-0042
    reference:
      - general-requirements.html#missing-data
    conformance:
      - SHALL
    conditionality: true
    requirement: '[In situations where data is not available] for [mandatory] coded data elements … [with] *example*, *preferred*, or *extensible* binding strengths (CodeableConcept or Coding datatypes) If the source system has text but no coded data, only the text element is used.'
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-requirements.html#CONF-0042
  - key: CONF-0043
    reference:
      - general-requirements.html#missing-data
    conformance:
      - SHALL
    conditionality: true
    requirement: |-
      [In situations where data is not available] for [mandatory] coded data elements… [with] *example*, *preferred*, or *extensible* binding strengths (CodeableConcept or Coding datatypes):
      For Coding datatypes, the text-only data is represented as a display element
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-requirements.html#CONF-0043
  - key: CONF-0044
    reference:
      - general-requirements.html#missing-data
    conformance:
      - SHALL
    conditionality: true
    requirement: '[In situations where data is not available] for [mandatory] coded data elements… [with] *example*, *preferred*, or *extensible* binding strengths (CodeableConcept or Coding datatypes): … If there is neither text nor coded data ... [then] use the appropriate “unknown” concept code from the ValueSet if available.'
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-requirements.html#CONF-0044
  - key: CONF-0045
    reference:
      - general-requirements.html#missing-data
    conformance:
      - SHALL
    conditionality: true
    requirement: '[In situations where data is not available] for [mandatory] coded data elements… [with] *example*, *preferred*, or *extensible* binding strengths (CodeableConcept or Coding datatypes): … If there is neither text nor coded data ... [then] if the ValueSet does not have the appropriate “unknown” concept code, use unknown from the [DataAbsentReason Code System](http://hl7.org/fhir/R4/codesystem-data-absent-reason.html).'
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-requirements.html#CONF-0045
  - key: CONF-0046
    reference:
      - general-requirements.html#missing-data
    conformance:
      - SHALL
    conditionality: true
    requirement: '[In situations where data is not available] for [mandatory] coded data elements… [with] *required* binding strength (CodeableConcept or code datatypes): use the appropriate “unknown” concept code from the ValueSet if available'
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-requirements.html#CONF-0046
  - key: CONF-0047
    reference:
      - general-requirements.html#missing-data
    conformance:
      - SHALL
    conditionality: true
    requirement: '[In situations where data is not available] for [mandatory] coded data elements… [with] *required* binding strength (CodeableConcept or code datatypes): If the ValueSet does not have the appropriate “unknown” concept code, you must use a concept from the ValueSet. Otherwise, the instance will not be conformant'
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-requirements.html#CONF-0047
  - key: CONF-0048
    reference:
      - general-requirements.html#missing-data
    conformance:
      - SHALL
    conditionality: true
    requirement: '[If the source system does not have data for a Mandatory element for a coded data element with *required* binding strength] If any of these status codes is missing [meaning it lacks an "unknown" or otherwise appropriate concept code from the ValueSet, a] 404 HTTP error code and an OperationOutcome **SHALL** be returned in response to a read transaction on the resource.'
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-requirements.html#CONF-0048
  - key: CONF-0049
    reference:
      - general-requirements.html#missing-data
    conformance:
      - SHALL
    conditionality: true
    requirement: '[If the source system does not have data for a Mandatory element for a coded data element with *required* binding strength, and the ValueSet does not have the appropriate "unknown" concept code, then] if returning a response to a search, the problematic resource **SHALL** be excluded from the search set'
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-requirements.html#CONF-0049
  - key: CONF-0050
    reference:
      - general-requirements.html#missing-data
    conformance:
      - SHOULD
    conditionality: true
    requirement: '[If the source system does not have data for a Mandatory element for a coded data element with *required* binding strength, and the ValueSet does not have the appropriate "unknown" concept code, then] if returning a response to a search, … a *warning* OperationOutcome **SHOULD** be included indicating that other search results were found but could not be compliantly expressed and have been suppressed.'
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-requirements.html#CONF-0050
  - key: CONF-0051
    reference:
      - general-requirements.html#fhir-restful-search-api-requirements
    conformance:
      - SHALL
    requirement: The [FHIR RESTful Search API](http://hl7.org/fhir/R4/http.html#search) requires that Servers that support search **SHALL** support the HTTP `POST`-based search.
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-requirements.html#CONF-0051
  - key: CONF-0052
    reference:
      - general-requirements.html#fhir-restful-search-api-requirements
    conformance:
      - SHALL
    requirement: For all the supported search interactions in this guide, Servers **SHALL** also support the `GET`-based search.
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-requirements.html#CONF-0052
  - key: CONF-0055
    reference:
      - general-requirements.html#fhir-restful-search-api-requirements
    conformance:
      - SHALL
    requirement: When searching using the `token` type searchparameter [(how to search by token)](http://hl7.org/fhir/R4/search.html#token) The Server **SHALL** support both [system and code values]
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-requirements.html#CONF-0055
  - key: CONF-0058
    reference:
      - general-requirements.html#fhir-restful-search-api-requirements
    conformance:
      - SHALL
    requirement: When searching using the `reference` type searchparameter [(how to search by reference)](http://hl7.org/fhir/R4/search.html#reference) The Server **SHALL** support both [id and Type values]
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-requirements.html#CONF-0058
  - key: CONF-0061
    reference:
      - general-requirements.html#fhir-restful-search-api-requirements
    conformance:
      - SHALL
    requirement: When searching using the `date` type searchparameter [(how to search by date)](http://hl7.org/fhir/R4/search.html#date) The Server **SHALL** support values precise to the day for elements of datatype `date`
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-requirements.html#CONF-0061
  - key: CONF-0062
    reference:
      - general-requirements.html#fhir-restful-search-api-requirements
    conformance:
      - SHALL
    requirement: When searching using the `date` type searchparameter [(how to search by date)](http://hl7.org/fhir/R4/search.html#date) The Server **SHALL** support values precise … to the second + time offset for elements of `datatype` dateTime
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-requirements.html#CONF-0062
  - key: CONF-0063
    reference:
      - general-requirements.html#search-for-Servers-requiring-status
    conformance:
      - SHOULD
    requirement: Servers **SHOULD** support a query for resources without requiring a status parameter.
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-requirements.html#CONF-0063
  - key: CONF-0064
    reference:
      - general-requirements.html#search-for-Servers-requiring-status
    conformance:
      - SHALL
    conditionality: true
    requirement: If business requirements prohibit [querying a resource without a status parameter], they **SHALL** follow the guidelines here.
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-requirements.html#CONF-0064
  - key: CONF-0065
    reference:
      - general-requirements.html#search-for-Servers-requiring-status
    conformance:
      - MAY
    requirement: For searches where the Client does not supply a status parameter, an implementation’s business rules **MAY** override the FHIR RESTful search expectations and require a status parameter to be provided
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-requirements.html#CONF-0065
  - key: CONF-0066
    reference:
      - general-requirements.html#search-for-Servers-requiring-status
    conformance:
      - SHALL
    requirement: |-
      For searches where the Client does not supply a status parameter, … systems [that require a status parameter to be provided] are allowed to reject such requests as follows:

      **SHALL** return an HTTP 400 status
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-requirements.html#CONF-0066
  - key: CONF-0067
    reference:
      - general-requirements.html#search-for-Servers-requiring-status
    conformance:
      - SHALL
    requirement: |-
      For searches where the Client does not supply a status parameter, … systems [that require a status parameter to be provided] are allowed to reject such requests as follows:

      **SHALL** return an [OperationOutcome](http://hl7.org/fhir/R4/operationoutcome.html) specifying that status(es) must be present.
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-requirements.html#CONF-0067
  - key: CONF-0068
    reference:
      - general-requirements.html#search-for-Servers-requiring-status
    conformance:
      - SHALL
    requirement: |-
      For searches where the Client does not supply a status parameter, … systems [that require a status parameter to be provided] are allowed to reject such requests as follows:

      **SHALL** support search with status if status required
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-requirements.html#CONF-0068
  - key: CONF-0069
    reference:
      - general-requirements.html#search-for-Servers-requiring-status
    requirement: ' **SHALL NOT** restrict search results ( i.e., apply ‘hidden’ filters) when a Client includes status parameters in the query.'
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-requirements.html#CONF-0069
    extension:
      - url: http://hl7.org/fhir/tools/StructureDefinition/requirements-statementshallnot
        valueBoolean: true
  - key: CONF-0070
    reference:
      - general-requirements.html#search-for-Servers-requiring-status
    conformance:
      - SHOULD
    conditionality: true
    requirement: '[For systems that require a status parameter to be provided,] if a system doesn’t support a specific status code value that is queried, it **SHOULD** return an HTTP 200 status with a search bundle.'
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-requirements.html#CONF-0070
  - key: CONF-0071
    reference:
      - general-requirements.html#search-for-Servers-requiring-status
    conformance:
      - SHOULD
    conditionality: true
    requirement: '[For systems that require a status parameter to be provided,] if a system doesn’t support a specific status code value that is queried [and returns a search bundle],... [t]he search bundle **SHOULD** contain resources matching the search criteria'
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-requirements.html#CONF-0071
  - key: CONF-0072
    reference:
      - general-requirements.html#search-for-Servers-requiring-status
    conformance:
      - SHOULD
    conditionality: true
    requirement: '[For systems that require a status parameter to be provided,] if a system doesn’t support a specific status code value that is queried [and returns a search bundle],... [t]he search bundle **SHOULD** contain ... an OperationOutcome warning the Client which status code value is not supported.'
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-requirements.html#CONF-0072
  - key: CONF-0073
    reference:
      - general-requirements.html#search-for-Servers-requiring-status
    conformance:
      - SHALL
    requirement: |-
      For searches where the Client does not supply a status parameter, … systems [that require a status parameter to be provided] are allowed to reject such requests as follows:...

      **SHALL** document this behavior in its CapabilityStatement for the “search-type” interaction in `CapabilityStatement.rest.resource.interaction.documentation.`
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: general-requirements.html#CONF-0073
  - key: CONF-0075
    reference:
      - must-support.html#must-support-elements
    conformance:
      - SHALL
    conditionality: true
    requirement: |-
      For querying and reading US Core Profiles, Must Support on any profile data element **SHALL** be interpreted as follows…:

      US Core Responders **SHALL** be capable of populating all data elements as part of the query results specified by the [US Core Server Capability Statement](https://hl7.org/fhir/us/core/STU8/CapabilityStatement-us-core-Server.html).
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: must-support.html#CONF-0075
  - key: CONF-0078
    reference:
      - must-support.html#must-support-elements
    conditionality: true
    requirement: ' **SHALL NOT** include the data elements in the resource instance returned as part of the query results.'
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: must-support.html#CONF-0078
    extension:
      - url: http://hl7.org/fhir/tools/StructureDefinition/requirements-statementshallnot
        valueBoolean: true
  - key: CONF-0080
    reference:
      - must-support.html#must-support-el+D647ements
    conformance:
      - SHOULD
    conditionality: true
    requirement: |-
      For querying and reading US Core Profiles, Must Support on any profile data element **SHALL** be interpreted as follows…:

      In cases where information on a specific data element is missing, and the US Core Responder knows the precise reason for the absence of data (other than suppressed data), US Core Responders **SHOULD** send the reason for the missing information.
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: must-support.html#CONF-0080
  - key: CONF-0081
    reference:
      - must-support.html#must-support-elements
    conformance:
      - SHOULD
    conditionality: true
    requirement: '[When sending reason for missing information, follow] the same methdology outlined in the [Missing Data](https://hl7.org/fhir/us/core/STU8/general-requirements.html#missing-data) section but using the appropriate reason code instead of unknown [reason code].'
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: must-support.html#CONF-0081
  - key: CONF-0084
    reference:
      - must-support.html#additional-uscdi-requirements
    conformance:
      - SHALL
    conditionality: true
    requirement: Implementors [US Core Responders] seeking ONC certification [in the ONC IT Health Certification program] **SHALL** interpret Additional USCDI Requirements as Must Support elements as documented above and below;
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: must-support.html#CONF-0084
  - key: CONF-0086
    reference:
      - must-support.html#additional-uscdi-requirements
    conformance:
      - SHALL
    conditionality: true
    requirement: Implementors [US Core Responders] [not] seeking ONC certification [in the ONC IT Health Certification program] **SHALL** interpret Additional USCDI Requirements as … optional.
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: must-support.html#CONF-0086
  - key: CONF-0087
    reference:
      - must-support.html#defined-pattern-elements
    conformance:
      - SHALL
    requirement: If an element is marked as Must Support and defined by a pattern [as described by [ElementDefinition.pattern](http://hl7.org/fhir/R4/elementdefinition-definitions.html#ElementDefinition.pattern_x_)], then the pattern defines the elements and element values that the Server **SHALL** be capable of providing.
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: must-support.html#CONF-0087
  - key: CONF-0090
    reference:
      - must-support.html#must-support---primitive-elements
    conformance:
      - SHALL
    requirement: Primitive elements are single elements with a primitive value. If they are marked as Must Support, then the Server **SHALL** be capable of providing the element value to meet the Must Support requirement.
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: must-support.html#CONF-0090
  - key: CONF-0091
    reference:
      - must-support.html#must-support---primitive-elements
    conformance:
      - SHALL
    requirement: '[W]hen claiming conformance [to a profile with a must support primitive element] … US Core responders **SHALL** be  capable of providing the value [of the primitive element]'
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: must-support.html#CONF-0091
  - key: CONF-0093
    reference:
      - must-support.html#must-support---complex-elements
    conformance:
      - SHALL
    requirement: For any complex element marked as Must Support, the Server **SHALL** be capable of providing at least one of the sub-element values.
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: must-support.html#CONF-0093
  - key: CONF-0094
    reference:
      - must-support.html#must-support---complex-elements
    conformance:
      - SHALL
    requirement: If any sub-element is marked as Must Support [for a complex element], it **SHALL** also meet the Must Support requirements and satisfy the Must Support requirements for the parent element.
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: must-support.html#CONF-0094
  - key: CONF-0095
    reference:
      - must-support.html#must-support---complex-elements
    conformance:
      - MAY
    requirement: '[I]f any sub-element is marked as Must Support or Additional USCDI [for a complex element] and the parent element is not, there is no expectation that you must support the parent.'
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: must-support.html#CONF-0095
  - key: CONF-0096
    reference:
      - must-support.html#must-support---complex-elements
    conformance:
      - SHALL
    requirement: '[I]f any sub-element is marked as Must Support [for a complex element] and the parent element is not… [and] the parent element is present in an instance, Servers **SHALL** support the sub-element(s) marked as Must Support.'
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: must-support.html#CONF-0096
  - key: CONF-0097
    reference:
      - must-support.html#must-support---complex-elements
    conformance:
      - SHALL
    requirement: When claiming conformance [to a must support complex element with no must support sub-elements] … US Core Responders **SHALL** be  capable of providing a value in [the] sub-element
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: must-support.html#CONF-0097
  - key: CONF-0099
    reference:
      - must-support.html#must-support---complex-elements
    conformance:
      - SHALL
    requirement: When claiming conformance [to a must support complex element with one or more must support sub-elements] … US Core Responders **SHALL** be  capable of providing a value in [each must support sub-element]
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: must-support.html#CONF-0099
  - key: CONF-0101
    reference:
      - must-support.html#must-support---complex-elements
    conformance:
      - MAY
    requirement: Systems [US Core Responders] can support the other elements [of a complex element, not labeled as a Must Support], but this is not a requirement of US Core
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: must-support.html#CONF-0101
  - key: CONF-0105
    reference:
      - must-support.html#must-support---resource-references
    conformance:
      - SHALL
    requirement: |-
      When a Reference type element is labeled as *Must Support*, has multiple target profiles referenced, and specific targets are labeled as *Must Support*,"
      ...

      - US Core Responders **SHALL** be capable of providing [such an element] with a valid reference to [all listed Must Support profile(s).]
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: must-support.html#CONF-0105
  - key: CONF-0107
    reference:
      - must-support.html#must-support---resource-references
    conformance:
      - MAY
    requirement: Systems [US Core Responders] can support other [resource] references [other than those labeled as Must Support], but this is not a requirement of US Core
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: must-support.html#CONF-0107
  - key: CONF-0109
    reference:
      - must-support.html#must-support---resource-references
    conformance:
      - SHALL
    requirement: |-
      When a Reference type element is labeled as *Must Support* and has a single target profile referenced
      ...
      - US Core Responders **SHALL** be capable of providing [such an element] with a valid reference to [the Must Support Profile.]
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: must-support.html#CONF-0109
  - key: CONF-0111
    reference:
      - must-support.html#must-support---choice-of-data-types
    conformance:
      - SHALL
    requirement: |-
      [If a profile has] a Must Support element [with] a choice of datatypes for its content [and some of] the datatypes … are labeled as Must Support
      … When claiming conformance to [such a] profile:

      - US Core Responders **SHALL** be capable of populating [the Must Support  data type choice]
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: must-support.html#CONF-0111
  - key: CONF-0114
    reference:
      - must-support.html#must-support---choice-of-data-types
    conformance:
      - MAY
    requirement: |-
      [If a profile has] a Must Support element [with] a choice of datatypes for its content [and some of] the datatypes … are labeled as Must Support[, or a profile has] an Additional USCDI element [with] a choice of datatypes for its content [and some of] the datatypes … are labeled as Additional USCDI

      …

      [US Core Responders] **MAY**  support populating ... other [data type] choice elements (such as Observation.effectivePeriod), but this is not a requirement of US Core.
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: must-support.html#CONF-0114
  - key: CONF-0115
    reference:
      - must-support.html#must-support---choice-of-profile-elements
    conformance:
      - SHALL
    conditionality: true
    requirement: There are several instances in this Guide where there is a choice of supporting one or another profile element to meet the Must Support or Additional USCDI requirement. In such cases, the Server  or Certifying System **SHALL** support at least one element.
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: must-support.html#CONF-0115
  - key: CONF-0117
    reference:
      - scopes.html#capability-sets
    conformance:
      - MAY
    requirement: An individual SMART Server will publish a granular list of its capabilities, and a set of these capabilities is combined to support a specific use, a Capability Set. See SMART App Launch’s [FHIR OAuth authorization Endpoints and Capabilities](https://hl7.org/fhir/smart-app-launch/STU2/conformance.html#smart-on-fhir-oauth-authorization-endpoints-and-capabilities) for more details. Servers **MAY**  support ... [any] SMART on FHIR Capability Sets and capabilities [(see [FHIR OAuth authorization Endpoints and Capabilities](https://hl7.org/fhir/smart-app-launch/STU2/conformance.html#smart-on-fhir-oauth-authorization-endpoints-and-capabilities))]
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: scopes.html#CONF-0117
  - key: CONF-0118
    reference:
      - scopes.html#capabilities-for-implementations-supporting-user-facing-applications
    conformance:
      - SHOULD
    conditionality: true
    requirement: |-
      At least one of the following SMART on FHIR Capability Sets **SHOULD** be supported for US Core Servers that support User-Facing Applications ...
      [Patient Access Standalone Apps](https://hl7.org/fhir/smart-app-launch/STU2/conformance.html#patient-access-for-standalone-apps)
      [Clinician Access for EHR Launch](https://hl7.org/fhir/smart-app-launch/STU2/conformance.html#clinician-access-for-standalone)
    _reference:
      - extension:
          - url: http://hl7.org/fhir/StructureDefinition/narrativeLink
            valueUrl: scopes.html#CONF-0118
  - key: CONF-0119
    reference:
